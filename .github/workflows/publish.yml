name: Publish

# Publishes on every pushed tag like v1.0.1
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:   # manual run publishes ONLY to GitHub Packages

permissions:
  contents: write   # create the GitHub Release
  id-token: write   # npm OIDC trusted publishing
  packages: write   # GitHub Packages

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      # npm OIDC trusted publishing needs a recent npm; setup-node ships an older one
      - name: Upgrade npm (OIDC support)
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      # ---- 1) Publish to npmjs.com (OIDC trusted publishing, no token) ----
      - name: Publish to npm
        if: github.event_name == 'push'
        run: npm publish --provenance --access public

      # ---- 2) Publish to GitHub Packages (scoped name) ----
      - name: Publish to GitHub Packages
        run: |
          npm pkg set name="@bayarcash/sdk"
          npm config set @bayarcash:registry "https://npm.pkg.github.com"
          npm config set "//npm.pkg.github.com/:_authToken" "${GITHUB_TOKEN}"
          npm publish --registry=https://npm.pkg.github.com --access public
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ---- 3) Create a GitHub Release for the tag ----
      - name: Create GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
